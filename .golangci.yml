version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
  exclusions:
    generated: lax
    rules:
      # Test handlers intentionally ignore ResponseWriter.Write errors.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
